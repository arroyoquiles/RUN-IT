<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>RUN-IT</title>
<meta name="theme-color" content="#080e08"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="RUN-IT"/>
<link rel="apple-touch-icon" id="ati"/>
<link rel="manifest" id="manifest-link"/>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#080e08;--bg2:#0f1a0f;--card:#131c13;--card2:#192519;
  --green:#4ade80;--lime:#a3e635;--muted:#4a6b4a;
  --text:#dff0df;--text2:#7a9d7a;--red:#f87171;--orange:#fb923c;--blue:#60a5fa;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;overflow-x:hidden}
body{max-width:480px;margin:0 auto;position:relative}

/* ── HEADER ── */
.header{background:var(--bg2);border-bottom:2px solid #1a2f1a;padding:14px 20px 11px;position:sticky;top:0;z-index:50}
.header-row{display:flex;align-items:center;justify-content:space-between}
.header h1{font-family:'Barlow Condensed',sans-serif;font-size:21px;font-weight:900;letter-spacing:3px;text-transform:uppercase;color:var(--green)}
.header-sub{font-size:10px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-top:2px}
.header-badge{background:#1a3a1a;border:1px solid #2a5a2a;border-radius:6px;padding:4px 10px;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;color:var(--green)}

/* ── BOTTOM NAV ── */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--bg2);border-top:2px solid #1a2f1a;display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.nav-btn{flex:1;padding:11px 0 9px;background:none;border:none;color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;transition:color .2s}
.nav-btn .ico{font-size:22px}
.nav-btn.active{color:var(--green)}

/* ── MAIN ── */
.main{padding:14px 14px 90px}
.view{display:none}.view.active{display:block}

/* ── WEEK LIST ── */
.week-section{margin-bottom:6px}
.week-header{background:var(--card2);border-radius:10px;padding:12px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;border:1px solid #1f2f1f;user-select:none}
.week-header.deload{border-color:#2f4a10}
.week-header.peak{border-color:#4a3000}
.week-header.taper{border-color:#103a4a}
.week-badge{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:10px;letter-spacing:1px;padding:3px 8px;border-radius:5px;text-transform:uppercase;background:var(--muted);color:#080e08}
.week-badge.deload{background:var(--lime)}
.week-badge.peak{background:var(--orange)}
.week-badge.taper{background:var(--blue)}
.week-title{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:17px;letter-spacing:.5px}
.week-header.current-week{border-color:var(--green);border-width:2px}
.week-header.current-week .week-badge{background:var(--green)}
.pin-btn{background:none;border:none;font-size:15px;cursor:pointer;padding:2px 4px;opacity:.45;transition:opacity .2s;flex-shrink:0}
.pin-btn.pinned{opacity:1}
.week-prog-row{display:flex;align-items:center;gap:7px;margin-top:4px}
.week-prog-bar{flex:1;height:4px;background:#1a2a1a;border-radius:2px;overflow:hidden}
.week-prog-fill{height:100%;background:var(--green);border-radius:2px;transition:width .3s}
.week-prog-txt{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;color:var(--muted);white-space:nowrap}
.week-sub{font-size:10px;color:var(--text2);letter-spacing:.5px;margin-top:1px}
.week-arrow{color:var(--muted);font-size:20px;font-family:'Barlow Condensed',sans-serif;font-weight:700;transition:transform .25s;line-height:1}
.week-header.open .week-arrow{transform:rotate(90deg)}

/* ── DAY GRID ── */
.days-grid{display:none;flex-direction:column;gap:3px;padding:4px 0 6px}
.days-grid.open{display:flex}
.day-card{background:var(--card);border-radius:8px;padding:11px 12px;display:flex;align-items:flex-start;gap:10px;cursor:pointer;border:1px solid #192519;transition:background .15s,border-color .15s;position:relative;overflow:hidden}
.day-card:active{background:var(--card2)}
.day-card.all-done{border-color:#2a5a2a}
.day-card.all-done::after{content:'✓';position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--green);font-size:18px;font-weight:800;font-family:'Barlow Condensed',sans-serif}
.day-card.rest-day{opacity:.45;cursor:default}
.day-lbl{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:12px;letter-spacing:2px;color:var(--text2);min-width:30px;padding-top:1px}
.day-info{flex:1;min-width:0}
.day-main{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;letter-spacing:.3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.day-sub{font-size:11px;color:var(--text2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.day-tags{display:flex;gap:3px;margin-top:5px;flex-wrap:wrap}
.tag{font-size:9px;font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:.5px;padding:1px 6px;border-radius:3px;text-transform:uppercase}
.tag.run{background:#0f2a1a;color:var(--green)}
.tag.strength{background:#1a0f2a;color:#c084fc}
.tag.core{background:#0f1a2a;color:var(--blue)}
.tag.rest{background:#1a1a1a;color:var(--muted)}
.prog-bar-wrap{height:3px;background:#1a2a1a;border-radius:2px;margin-top:5px;overflow:hidden}
.prog-bar-fill{height:100%;background:var(--green);border-radius:2px;transition:width .3s}

/* ── DAY DETAIL SLIDE ── */
.day-detail{position:fixed;top:0;left:50%;transform:translateX(-50%) translateX(100%);width:100%;max-width:480px;height:100%;background:var(--bg);z-index:200;transition:transform .3s cubic-bezier(.4,0,.2,1);overflow-y:auto;padding-bottom:32px}
.day-detail.open{transform:translateX(-50%) translateX(0)}
.detail-header{background:var(--bg2);padding:14px 18px;position:sticky;top:0;z-index:10;border-bottom:1px solid #1a2a1a;display:flex;align-items:center;gap:12px}
.back-btn{background:none;border:none;color:var(--green);font-size:26px;cursor:pointer;padding:0 6px 0 0;font-family:'Barlow Condensed',sans-serif;font-weight:700;line-height:1}
.detail-week-lbl{font-size:10px;color:var(--text2);letter-spacing:1.5px;text-transform:uppercase;font-family:'Barlow Condensed',sans-serif}
.detail-day-lbl{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:900;letter-spacing:1.5px;text-transform:uppercase;line-height:1.1}
.detail-body{padding:14px}

/* ── SECTION CARD ── */
.s-card{background:var(--card);border-radius:12px;padding:14px;margin-bottom:10px;border:1px solid #192519}
.s-label{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.s-label::after{content:'';flex:1;height:1px;background:#1f2f1f}

/* ── CHECK ITEMS ── */
.check-item{display:flex;align-items:flex-start;gap:11px;padding:10px 0;border-bottom:1px solid #192519;cursor:pointer;user-select:none}
.check-item:last-child{border-bottom:none;padding-bottom:0}
.chkbox{width:22px;height:22px;border-radius:6px;border:2px solid var(--muted);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s;margin-top:1px}
.check-item.done .chkbox{background:var(--green);border-color:var(--green)}
.check-item.done .chkbox::after{content:'✓';color:#080e08;font-size:13px;font-weight:800}
.check-item.done .c-title{color:var(--muted);text-decoration:line-through}
.check-item.done .c-desc{color:#2a4a2a}
.c-text{flex:1}
.c-title{font-weight:600;font-size:14px;line-height:1.3}
.c-desc{font-size:11px;color:var(--text2);margin-top:3px;line-height:1.5}

/* ── SET BREAKDOWN ── */
.set-block{background:var(--bg2);border-radius:10px;margin-top:8px;overflow:hidden}
.set-hdr{display:flex;align-items:center;justify-content:space-between;padding:9px 13px;border-bottom:1px solid #1a2a1a}
.set-hdr-series{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:900;color:var(--green);letter-spacing:.5px}
.set-hdr-rest{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase}
.ex-row{display:flex;align-items:center;padding:10px 13px;border-bottom:1px solid #111a11;gap:10px}
.ex-row:last-child{border-bottom:none}
.ex-ico{font-size:18px;width:24px;text-align:center;flex-shrink:0}
.ex-name{flex:1;font-size:14px;color:var(--text);font-weight:500}
.ex-num{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;color:var(--green);min-width:44px;text-align:right}

/* ── LOG TIME (in detail) ── */
.log-card{background:var(--card);border-radius:12px;padding:14px;margin-bottom:10px;border:1px solid #192519}
.log-card-title{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.t-inputs{display:flex;align-items:center;gap:6px}
.t-input{background:var(--bg2);border:1px solid #2a3f2a;border-radius:8px;color:var(--text);font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:700;text-align:center;padding:8px 0;width:58px;outline:none;-moz-appearance:textfield}
.t-input::-webkit-inner-spin-button,.t-input::-webkit-outer-spin-button{-webkit-appearance:none}
.t-input:focus{border-color:var(--green)}
.t-sep{font-size:22px;font-weight:700;color:var(--muted);padding-bottom:2px}
.t-lbls{display:flex;align-items:center;gap:6px;margin-top:4px}
.t-lbl{font-size:9px;color:var(--muted);text-align:center;width:58px;letter-spacing:1px;text-transform:uppercase}
.t-lbl-gap{width:14px}
.save-btn{background:var(--green);color:#080e08;border:none;border-radius:8px;padding:11px;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:800;letter-spacing:1px;text-transform:uppercase;cursor:pointer;margin-top:10px;width:100%;transition:opacity .15s}
.save-btn:active{opacity:.8}

/* ── PROGRESS VIEW ── */
.p-add-card{background:var(--card);border-radius:12px;padding:14px;border:1px solid #192519;margin-bottom:10px}
.f-label{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.f-select{background:var(--bg2);border:1px solid #2a3f2a;border-radius:8px;color:var(--text);font-family:'Barlow',sans-serif;font-size:14px;padding:10px 12px;width:100%;outline:none;margin-bottom:10px;-webkit-appearance:none}
.f-select:focus{border-color:var(--green)}

.filter-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.f-btn{background:var(--card2);border:1px solid #2a3a2a;border-radius:20px;color:var(--text2);font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:.5px;padding:4px 11px;cursor:pointer;transition:all .2s}
.f-btn.active{background:var(--green);color:#080e08;border-color:var(--green)}

.chart-wrap{background:var(--card);border-radius:12px;padding:14px;border:1px solid #192519;margin-bottom:10px}
.chart-head{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text2);margin-bottom:10px}

.hist-title{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:800;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
.log-list{display:flex;flex-direction:column;gap:5px}
.log-entry{background:var(--card);border-radius:8px;padding:11px 13px;display:flex;align-items:center;border:1px solid #192519;gap:8px}
.le-left{flex:1;min-width:0}
.le-run{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.le-date{font-size:10px;color:var(--text2);margin-top:2px}
.le-time{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;color:var(--green);white-space:nowrap}
.del-btn{background:none;border:none;color:var(--muted);font-size:16px;cursor:pointer;padding:4px;flex-shrink:0}

/* ── EMPTY STATE ── */
.empty{text-align:center;padding:32px 16px;color:var(--muted)}
.empty-ico{font-size:44px;margin-bottom:8px}
.empty-txt{font-family:'Barlow Condensed',sans-serif;font-size:14px;letter-spacing:1px;line-height:1.6}

/* ── TOAST ── */
.toast{position:fixed;bottom:82px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--green);color:#080e08;padding:9px 20px;border-radius:20px;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:800;letter-spacing:1px;opacity:0;transition:all .3s;z-index:300;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── REF INFO ── */
.ref-row{font-size:12px;color:var(--text2);line-height:1.9;display:flex;gap:6px}
.ref-ico{flex-shrink:0}

/* ── EDIT OVERLAY ── */
.edit-overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:400;display:flex;align-items:flex-end;justify-content:center}
.edit-sheet{background:var(--bg2);border-radius:18px 18px 0 0;padding:20px 18px 36px;width:100%;max-width:480px;border-top:2px solid #2a4a2a}
.edit-sheet-title{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:900;letter-spacing:1px;text-transform:uppercase;margin-bottom:16px;color:var(--green)}
.edit-row{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.edit-label{flex:1;font-size:14px;color:var(--text);font-weight:500}
.edit-input{background:var(--bg);border:1px solid #2a4a2a;border-radius:8px;color:var(--text);font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;text-align:center;padding:6px 0;width:70px;outline:none;-moz-appearance:textfield}
.edit-input::-webkit-inner-spin-button,.edit-input::-webkit-outer-spin-button{-webkit-appearance:none}
.edit-input:focus{border-color:var(--green)}
.edit-btns{display:flex;gap:8px;margin-top:16px}
.edit-cancel{flex:1;background:var(--card);border:1px solid #2a3a2a;border-radius:8px;color:var(--text2);font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:800;letter-spacing:1px;padding:11px;cursor:pointer}
.edit-save{flex:2;background:var(--green);border:none;border-radius:8px;color:#080e08;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:800;letter-spacing:1px;padding:11px;cursor:pointer}
.edit-reset{background:none;border:none;color:var(--muted);font-size:11px;letter-spacing:1px;font-family:'Barlow Condensed',sans-serif;cursor:pointer;text-decoration:underline;display:block;margin-top:10px;text-align:center;width:100%}
</style>
</head>
<body>

<div class="header">
  <div class="header-row">
    <div>
      <h1>RUN-IT</h1>
      <div class="header-sub">13 Semanas · 1.5 Milla + Fuerza</div>
    </div>
    <div class="header-badge" id="header-badge">Sem 1</div>
  </div>
</div>

<div class="main" id="main">

  <!-- PLAN VIEW -->
  <div class="view active" id="view-plan">
    <div id="week-list"></div>
  </div>

  <!-- PROGRESS VIEW -->
  <div class="view" id="view-progress">
    <div class="p-add-card">
      <div class="f-label">Registrar Tiempo</div>
      <select class="f-select" id="run-sel">
        <option value="">Selecciona el ejercicio...</option>
        <option value="1.5 Milla (Test)">🎯 1.5 Milla — Test</option>
        <option value="1.5 Milla Fuerte">1.5 Milla Fuerte</option>
        <option value="1.5 Milla Benchmark">1.5 Milla Benchmark</option>
        <option value="1.5 Milla Controlado">1.5 Milla Controlado</option>
        <option value="1.5 Milla Relajado">1.5 Milla Relajado</option>
        <option value="1.5 Millas Tempo">1.5 Millas Tempo</option>
        <option value="1.75 Millas Tempo">1.75 Millas Tempo</option>
        <option value="1.25 Millas Tempo">1.25 Millas Tempo</option>
        <option value="1 Milla Tempo">1 Milla Tempo</option>
        <option value="1 Milla Easy">1 Milla Easy</option>
        <option value="2 Millas Easy">2 Millas Easy</option>
        <option value="2.25 Millas Easy">2.25 Millas Easy</option>
        <option value="2.5 Millas Easy">2.5 Millas Easy</option>
        <option value="4 × 400m">4 × 400m</option>
        <option value="5 × 400m">5 × 400m</option>
        <option value="6 × 400m">6 × 400m</option>
        <option value="7 × 400m">7 × 400m</option>
        <option value="6 × 200m">6 × 200m</option>
        <option value="3 × 800m">3 × 800m</option>
        <option value="4 × 400m Goal Pace">4 × 400m Goal Pace</option>
      </select>
      <div class="f-label">Tiempo (min : seg . centésimas)</div>
      <div class="t-inputs">
        <input class="t-input" id="p-min" type="number" min="0" max="59" placeholder="00" inputmode="numeric"/>
        <span class="t-sep">:</span>
        <input class="t-input" id="p-sec" type="number" min="0" max="59" placeholder="00" inputmode="numeric"/>
        <span class="t-sep">.</span>
        <input class="t-input" id="p-cs" type="number" min="0" max="99" placeholder="00" inputmode="numeric"/>
      </div>
      <div class="t-lbls">
        <span class="t-lbl">Min</span>
        <span class="t-lbl-gap"></span>
        <span class="t-lbl">Seg</span>
        <span class="t-lbl-gap"></span>
        <span class="t-lbl">Cent</span>
      </div>
      <button class="save-btn" onclick="addProg()">+ Guardar Tiempo</button>
    </div>

    <div class="filter-row" id="filter-row"></div>

    <div class="chart-wrap">
      <div class="chart-head" id="chart-head">— Sin datos —</div>
      <canvas id="prog-chart" height="200"></canvas>
    </div>

    <div class="hist-title">Historial</div>
    <div class="log-list" id="log-list"></div>
  </div>

</div>

<!-- DAY DETAIL OVERLAY -->
<div class="day-detail" id="day-detail">
  <div class="detail-header">
    <button class="back-btn" onclick="closeDetail()">←</button>
    <div>
      <div class="detail-week-lbl" id="d-week-lbl"></div>
      <div class="detail-day-lbl" id="d-day-lbl"></div>
    </div>
  </div>
  <div class="detail-body" id="d-body"></div>
</div>

<!-- EDIT SHEET OVERLAY -->
<div class="edit-overlay" id="edit-overlay" style="display:none" onclick="closeEdit(event)">
  <div class="edit-sheet" onclick="event.stopPropagation()">
    <div class="edit-sheet-title">✏️ Edit Sets</div>
    <div class="edit-row"><span class="edit-label">Sets</span><input class="edit-input" id="e-sets" type="number" min="1" max="10" inputmode="numeric"/></div>
    <div class="edit-row"><span class="edit-label">Push Ups</span><input class="edit-input" id="e-pu" type="number" min="0" inputmode="numeric"/></div>
    <div class="edit-row"><span class="edit-label">Sit Ups</span><input class="edit-input" id="e-su" type="number" min="0" inputmode="numeric"/></div>
    <div class="edit-row"><span class="edit-label" id="e-leg-lbl">Squats</span><input class="edit-input" id="e-legs" type="number" min="0" inputmode="numeric"/></div>
    <div class="edit-row"><span class="edit-label">Plank (e.g. 30s)</span><input class="edit-input" id="e-plank" type="text" style="width:80px;font-size:16px"/></div>
    <div class="edit-btns">
      <button class="edit-cancel" onclick="closeEdit()">Cancel</button>
      <button class="edit-save" onclick="saveEdit()">Save</button>
    </div>
    <button class="edit-reset" onclick="resetEdit()">Reset to original</button>
  </div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <button class="nav-btn active" id="nav-plan" onclick="switchView('plan')">
    <span class="ico">📋</span><span>Plan</span>
  </button>
  <button class="nav-btn" id="nav-progress" onclick="switchView('progress')">
    <span class="ico">📈</span><span>Progreso</span>
  </button>
</div>

<div class="toast" id="toast"></div>

<script>
// ============================================================
// DATA
// ============================================================

const LS_C = 'bmt_completed_v2';
const LS_P = 'bmt_progress_v2';

function getC(){try{return JSON.parse(localStorage.getItem(LS_C)||'{}')}catch{return{}}}

function getP(){try{return JSON.parse(localStorage.getItem(LS_P)||'[]')}catch{return[]}}

// ============================================================
// UTILS
// ============================================================
function dayKey(w,d){return `w${w}_${d}`}
function fmtTime(e){
  const m=String(e.min||0).padStart(2,'0');
  const s=String(e.sec||0).padStart(2,'0');
  const c=String(e.cs||0).padStart(2,'0');
  return `${m}:${s}.${c}`;
}
function fmtDate(iso){
  const d=new Date(iso);
  return d.toLocaleDateString('es',{day:'2-digit',month:'short',year:'2-digit'});
}
function totalSec(e){return (e.min||0)*60+(e.sec||0)+(e.cs||0)/100}

let toastT;
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),2200);
}

// CHECK ITEMS BUILDER
// ============================================================
function buildChecks(w, dayName, dd){
  const items=[];
  if(!dd||dd.rest)return items;
  if(dd.warmup) items.push({id:'warmup',title:'🔥 Calentamiento',desc:'5 min trote suave · Leg Swings · Ankle Circles · 2 Strides'});
  if(dd.run)    items.push({id:'run',title:'🏃 '+dd.run,desc:'Sesión de mañana (AM)'});
  if(dd.extra_core) items.push({id:'core',title:'⚡ Core Extra',desc:'2 rondas · 4 ejercicios',core:true});
  if(dd.pm){
    const p=dd.pm, ll=p.legType==='Lunges'?'Estocadas':'Sentadillas';
    items.push({id:'pm',title:`💪 Calisthenics PM — ${p.sets} Sets`,
      desc:`${p.pu} Push Ups · ${p.su} Sit Ups · ${p.legs} ${p.legType==='Lunges'?'Lunges':'Squats'} · Plank ${p.plank}`,pm:p});
  }
  return items;
}

function getDayComp(w,day){
  const meta=WEEKS[w-1]; if(!meta)return{done:0,total:0};
  const dd=BLK[meta.blk][day]; if(!dd||dd.rest)return{done:0,total:0};
  const items=buildChecks(w,day,dd); const total=items.length;
  const compl=getC(); let done=0;
  items.forEach(it=>{if(compl[dayKey(w,day)+'_'+it.id])done++;});
  return{done,total};
}

// PLAN RENDER
// ============================================================
function renderPlan(){
  const container=document.getElementById('week-list');
  let html='';
  WEEKS.forEach(meta=>{
    const{w,blk,label,group,type}=meta;
    const tc=type!=='build'?type:'';
    let daysHtml='';
    DAYS.forEach(d=>{
      const dd=BLK[blk][d]; if(!dd)return;
      if(dd.rest){
        daysHtml+=`<div class="day-card rest-day"><span class="day-lbl">${DAY_SHORT[d]}</span><div class="day-info"><div class="day-main" style="color:var(--muted)">Descanso</div><div class="day-tags"><span class="tag rest">Rest</span></div></div></div>`;
        return;
      }
      const{done,total}=getDayComp(w,d);
      const allDone=total>0&&done===total;
      const tags=(dd.run?'<span class="tag run">Run</span>':'')+(dd.pm?'<span class="tag strength">Fuerza</span>':'')+(dd.extra_core?'<span class="tag core">Core</span>':'');
      const bar=total>0?`<div class="prog-bar-wrap"><div class="prog-bar-fill" style="width:${Math.round(done/total*100)}%"></div></div>`:'';
      const pmSub=dd.pm?`<div class="day-sub">PM: ${dd.pm.sets}×(${dd.pm.pu} Push Ups · ${dd.pm.su} Sit Ups · ${dd.pm.legs} ${dd.pm.legType==='Lunges'?'Lunges':'Squats'} · Plank ${dd.pm.plank})</div>`:'';
      daysHtml+=`<div class="day-card${allDone?' all-done':''}" onclick="openDetail(${w},'${d}')">
        <span class="day-lbl">${DAY_SHORT[d]}</span>
        <div class="day-info">
          <div class="day-main">${dd.run||'Solo Calistenia'}</div>
          ${pmSub}
          <div class="day-tags">${tags}</div>
          ${bar}
        </div>
      </div>`;
    });

    // Week day progress
    let daysDone=0, daysTotal=0;
    DAYS.forEach(d=>{
      const dd=BLK[blk][d]; if(!dd||dd.rest)return;
      const{done,total}=getDayComp(w,d);
      if(total>0){daysTotal++; if(done===total)daysDone++;}
    });
    const weekPct=daysTotal>0?Math.round(daysDone/daysTotal*100):0;
    const isCurrent=getCurWeek()===w;

    html+=`<div class="week-section">
      <div class="week-header ${tc}${isCurrent?' current-week':''}" onclick="toggleWeek(this)">
        <div style="display:flex;align-items:center;gap:10px;flex:1;min-width:0">
          <span class="week-badge ${tc}">S${w}</span>
          <div style="flex:1;min-width:0">
            <div class="week-title">${label}${isCurrent?' <span style="color:var(--green);font-size:12px;letter-spacing:1px">← Aquí</span>':''}</div>
            <div class="week-prog-row">
              <div class="week-prog-bar"><div class="week-prog-fill" style="width:${weekPct}%"></div></div>
              <span class="week-prog-txt">${daysDone}/${daysTotal} días</span>
            </div>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:4px;flex-shrink:0">
          <button class="pin-btn${isCurrent?' pinned':''}" onclick="event.stopPropagation();pinWeek(${w})" title="Fijar semana actual">📍</button>
          <span class="week-arrow">›</span>
        </div>
      </div>
      <div class="days-grid">${daysHtml}</div>
    </div>`;
  });
  container.innerHTML=html;
}

function toggleWeek(h){
  h.classList.toggle('open');
  h.nextElementSibling.classList.toggle('open');
}

let curDetail=null;
let savedScrollY=0;
function openDetail(w,day){
  curDetail={w,day};
  savedScrollY=window.scrollY;
  const meta=WEEKS[w-1];
  document.getElementById('d-week-lbl').textContent=meta.group;
  document.getElementById('d-day-lbl').textContent=`${meta.label} · ${DN[day]||day}`;
  renderDetail(w,day);
  document.getElementById('day-detail').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeDetail(){
  document.getElementById('day-detail').classList.remove('open');
  document.body.style.overflow='';
  const w=curDetail?curDetail.w:null;
  curDetail=null;
  renderPlan();
  // restore scroll and keep the week open
  requestAnimationFrame(()=>{
    if(w){
      // re-open the week section
      const headers=document.querySelectorAll('.week-header');
      headers.forEach(h=>{
        const badge=h.querySelector('.week-badge');
        if(badge&&badge.textContent.trim()===`S${w}`){
          if(!h.classList.contains('open')){
            h.classList.add('open');
            h.nextElementSibling.classList.add('open');
          }
        }
      });
    }
    window.scrollTo({top:savedScrollY,behavior:'instant'});
  });
}
function renderDetail(w,day){

  const dd=BLK[meta.blk][day];
  const body=document.getElementById('d-body');

    body.innerHTML=`<div class="empty"><div class="empty-ico">😴</div><div class="empty-txt">Día de descanso.<br>Recupera cuerpo y mente.</div></div>`;
    return;
  }

  const compl=getC();
  const items=buildChecks(w,day,dd);
  let html='';

  // Time logger for distance runs
  const isTimedRun=dd.run&&/milla|millas|benchmark|test|fuerte|controlado|relajado/i.test(dd.run)&&!/×/i.test(dd.run);

      <div class="log-card-title">⏱ Registrar Tiempo</div>

    </div>`;
  }

  // Checklist
  html+=`<div class="s-card"><div class="s-label">Checklist del día</div>`;
  items.forEach(it=>{
    const k=dayKey(w,day)+'_'+it.id;
    const done=!!compl[k];
    const legLabel=it.pm?(it.pm.legType==='Lunges'?'Lunges':'Squats'):'';
    // apply any user edits

        </div>
      </div>
      <div class="ex-row"><span class="ex-ico">💪</span><span class="ex-name">Push Ups</span><span class="ex-num">${ep.pu}</span></div>

      <div class="ex-row"><span class="ex-ico">🦵</span><span class="ex-name">${legLabel}</span><span class="ex-num">${ep.legs}</span></div>
      <div class="ex-row"><span class="ex-ico">⏱</span><span class="ex-name">Plank</span><span class="ex-num">${ep.plank}</span></div>
    </div>`:it.core?`<div class="set-block">
      <div class="set-hdr">
        <span class="set-hdr-series">2 Rounds</span>
        <span class="set-hdr-rest">⏸ No rest between exercises</span>
      </div>
      <div class="ex-row"><span class="ex-ico">🧱</span><span class="ex-name">Front Plank</span><span class="ex-num" style="font-size:17px">30–45s</span></div>

function toggleChk(k,w,day){
  const c=getC(); c[k]=!c[k]; setC(c);
  renderDetail(w,day);
  toast(c[k]?'✓ Completado':'Desmarcado');
}

function logFromDetail(w,day){
  const min=parseInt(document.getElementById('d-min').value)||0;
  const sec=parseInt(document.getElementById('d-sec').value)||0;
  const cs=parseInt(document.getElementById('d-cs').value)||0;
  if(min===0&&sec===0){toast('⚠️ Ingresa un tiempo');return;}
  const meta=WEEKS[w-1];
  const dd=BLK[meta.blk][day];
  const run=dd.run.replace(/[🔥💪🎯]/g,'').trim();
  const p=getP();
  p.push({id:Date.now(),run,w,day,min,sec,cs,date:new Date().toISOString()});
  setP(p);
  toast('⏱ Tiempo guardado');
  document.getElementById('d-min').value='';
  document.getElementById('d-sec').value='';
  document.getElementById('d-cs').value='';
}

// PROGRESS VIEW
// ============================================================
let progChart=null;
let activeFilter='';

function renderProgress(){
  const prog=getP();
  renderFilter(prog);
  renderChart(prog);
  renderLogList(prog);
}

function renderFilter(prog){
  const used=[...new Set(prog.map(p=>p.run))];
  const row=document.getElementById('filter-row');
  if(!used.length){row.innerHTML='';return;}
  if(!used.includes(activeFilter))activeFilter=used[0];
  row.innerHTML=used.map(r=>`<button class="f-btn${r===activeFilter?' active':''}" onclick="setFilter('${r.replace(/'/g,"\\'")}')">
    ${r.length>22?r.slice(0,20)+'…':r}
  </button>`).join('');
}

function setFilter(r){activeFilter=r;renderProgress();}

function renderChart(prog){
  const filtered=prog.filter(p=>p.run===activeFilter).sort((a,b)=>new Date(a.date)-new Date(b.date));
  const head=document.getElementById('chart-head');
  const ctx=document.getElementById('prog-chart').getContext('2d');
  if(progChart){progChart.destroy();progChart=null;}

  if(!filtered.length){
    head.textContent=activeFilter?'Sin datos para '+activeFilter:'— Agrega tu primer tiempo —';
    ctx.clearRect(0,0,300,200);
    return;
  }
  head.textContent=`${activeFilter} · ${filtered.length} entrad${filtered.length===1?'a':'as'}`;

  const minVal=Math.min(...filtered.map(e=>totalSec(e)));
  const best=filtered.find(e=>totalSec(e)===minVal);
  const bestIdx=filtered.indexOf(best);

  progChart=new Chart(ctx,{
    type:'line',
    data:{
      labels:filtered.map((e,i)=>`#${i+1}`),
      datasets:[{
        data:filtered.map(e=>totalSec(e)),
        borderColor:'#4ade80',
        backgroundColor:'rgba(74,222,128,0.08)',
        borderWidth:2.5,
        pointBackgroundColor:filtered.map((_,i)=>i===bestIdx?'#a3e635':'#4ade80'),
        pointRadius:filtered.map((_,i)=>i===bestIdx?7:5),
        tension:.35,fill:true
      }]
    },
    options:{
      responsive:true,maintainAspectRatio:true,
      plugins:{
        legend:{display:false},
        tooltip:{
          callbacks:{label:ctx=>{const e=filtered[ctx.dataIndex];return`⏱ ${fmtTime(e)}`;}},
          backgroundColor:'#131c13',titleColor:'#7a9d7a',bodyColor:'#4ade80',
          borderColor:'#192519',borderWidth:1,displayColors:false
        }
      },
      scales:{
        y:{
          reverse:true,
          grid:{color:'#192519'},
          ticks:{color:'#4a6b4a',callback:v=>{const m=Math.floor(v/60),s=Math.floor(v%60);return`${m}:${String(s).padStart(2,'0')}`;}}
        },
        x:{grid:{color:'#192519'},ticks:{color:'#4a6b4a',font:{size:11}}}
      }
    }
  });
}

function renderLogList(prog){
  const sorted=[...prog].sort((a,b)=>new Date(b.date)-new Date(a.date));
  const el=document.getElementById('log-list');
  if(!sorted.length){
    el.innerHTML=`<div class="empty"><div class="empty-ico">🏁</div><div class="empty-txt">Todavía no hay tiempos guardados.<br>¡Sal y corre!</div></div>`;
    return;
  }
  el.innerHTML=sorted.map(e=>`
    <div class="log-entry">
      <div class="le-left">
        <div class="le-run">${e.run}</div>
        <div class="le-date">${fmtDate(e.date)}${e.w?` · Semana ${e.w}`:''}${e.day?` · ${DN[e.day]||e.day}`:''}</div>
      </div>
      <div class="le-time">${fmtTime(e)}</div>
      <button class="del-btn" onclick="delProg(${e.id})">🗑</button>
    </div>
  `).join('');
}

function addProg(){
  const run=document.getElementById('run-sel').value;
  const min=parseInt(document.getElementById('p-min').value)||0;
  const sec=parseInt(document.getElementById('p-sec').value)||0;
  const cs=parseInt(document.getElementById('p-cs').value)||0;
  if(!run){toast('⚠️ Selecciona el ejercicio');return;}
  if(min===0&&sec===0){toast('⚠️ Ingresa un tiempo');return;}
  const p=getP();
  p.push({id:Date.now(),run,min,sec,cs,date:new Date().toISOString()});
  setP(p);
  activeFilter=run;
  document.getElementById('run-sel').value='';
  document.getElementById('p-min').value='';
  document.getElementById('p-sec').value='';
  document.getElementById('p-cs').value='';
  renderProgress();
  toast('⏱ Tiempo guardado');
}

function delProg(id){
  const p=getP().filter(e=>e.id!==id);setP(p);
  renderProgress();toast('Eliminado');
}

// ============================================================
// CURRENT WEEK PIN
// ============================================================
const LS_W='bmt_curweek_v1';
function getCurWeek(){return parseInt(localStorage.getItem(LS_W)||'1');}
function pinWeek(w){
  localStorage.setItem(LS_W,w);
  document.getElementById('header-badge').textContent=`Sem ${w}`;
  renderPlan();
  toast(`📍 Semana ${w} fijada`);
}
function updateBadge(){
  document.getElementById('header-badge').textContent=`Sem ${getCurWeek()}`;
}

// ============================================================
// EDIT SETS
// ============================================================
let curEditKey=null, curEditW=null, curEditDay=null, curEditOriginal=null;
function openEdit(editKey, w, day){
  const meta=WEEKS[w-1];
  const dd=BLK[meta.blk][day];
  if(!dd||!dd.pm)return;
  const edits=getE();
  const ep=edits[editKey]||dd.pm;
  curEditKey=editKey; curEditW=w; curEditDay=day;
  curEditOriginal=dd.pm;
  document.getElementById('e-sets').value=ep.sets;
  document.getElementById('e-pu').value=ep.pu;
  document.getElementById('e-su').value=ep.su;
  document.getElementById('e-legs').value=ep.legs;
  document.getElementById('e-plank').value=ep.plank;
  document.getElementById('e-leg-lbl').textContent=dd.pm.legType==='Lunges'?'Lunges':'Squats';
  document.getElementById('edit-overlay').style.display='flex';
}
function closeEdit(e){
  if(e&&e.target!==document.getElementById('edit-overlay'))return;
  document.getElementById('edit-overlay').style.display='none';
}
function saveEdit(){
  const edits=getE();
  edits[curEditKey]={
    sets:parseInt(document.getElementById('e-sets').value)||curEditOriginal.sets,
    pu:parseInt(document.getElementById('e-pu').value)||curEditOriginal.pu,
    su:parseInt(document.getElementById('e-su').value)||curEditOriginal.su,
    legs:parseInt(document.getElementById('e-legs').value)||curEditOriginal.legs,
    plank:document.getElementById('e-plank').value||curEditOriginal.plank,
    legType:curEditOriginal.legType
  };
  setE(edits);
  document.getElementById('edit-overlay').style.display='none';
  renderDetail(curEditW,curEditDay);
  toast('✏️ Saved');
}
function resetEdit(){
  const edits=getE();
  delete edits[curEditKey];
  setE(edits);
  document.getElementById('edit-overlay').style.display='none';
  renderDetail(curEditW,curEditDay);
  toast('↩️ Reset to original');
}

renderPlan();
updateBadge();
